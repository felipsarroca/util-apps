<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Biblioteca de la Sol - Escola Ramon Pont</title>
    <link rel="icon" href="assets/logo-sol.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/config.js" defer></script>
    <script src="js/shared.js" defer></script>
    <script src="js/cataleg.js" defer></script>
  </head>
  <body>
    <main class="home-shell">
      <section class="home-dashboard">
        <div class="hero-copy">
          <div class="hero-title">
            <img src="assets/logo-sol.svg" alt="" width="64" height="64">
            <div>
              <h1>Benvinguda a la Biblioteca de la Sol</h1>
              <p class="subtitle">Escola Ramon Pont</p>
            </div>
          </div>
          <form id="home-login-form" class="home-login-form">
            <label for="home-email">Entra amb el teu correu del centre</label>
            <div class="search-row">
              <input id="home-email" name="email" type="email" autocomplete="email" required placeholder="nom@ramonpont.cat">
              <button class="button icon-login" type="submit">Entrar</button>
            </div>
            <p id="home-login-message" class="form-message" role="status"></p>
          </form>
          <a class="catalog-shortcut icon-catalog" href="cataleg.html">Consultar el catàleg sense entrar</a>
        </div>
        <aside class="summary-panel" aria-label="Resum del catàleg">
          <h2>Estat del catàleg</h2>
          <dl class="stats-grid">
            <div>
              <dt id="stat-books">0</dt>
              <dd>Llibres</dd>
            </div>
            <div>
              <dt id="stat-copies">0</dt>
              <dd>Exemplars</dd>
            </div>
            <div>
              <dt id="stat-available">0</dt>
              <dd>Disponibles</dd>
            </div>
          </dl>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <p><a href="https://ja.cat/felipsarroca">Felip Sarroca</a> - Biblioteca de la Sol v1.0</p>
      <p>Codi: AGPLv3 · Continguts: CC BY-NC-SA 4.0 · © 2026 · <a href="https://github.com/" rel="noopener">Suggeriments i errors</a></p>
    </footer>
  </body>
</html>
