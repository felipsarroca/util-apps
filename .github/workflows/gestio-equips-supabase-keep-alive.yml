name: Gestio-Equips Supabase keep alive

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Gestio-Equips Supabase keep-alive function
        run: |
          curl --fail --show-error --silent \
            --request GET \
            --header "x-keep-alive-token: $SUPABASE_KEEP_ALIVE_TOKEN" \
            "$SUPABASE_KEEP_ALIVE_URL"
        env:
          SUPABASE_KEEP_ALIVE_URL: ${{ secrets.SUPABASE_KEEP_ALIVE_URL }}
          SUPABASE_KEEP_ALIVE_TOKEN: ${{ secrets.SUPABASE_KEEP_ALIVE_TOKEN }}
