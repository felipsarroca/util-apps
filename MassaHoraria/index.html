<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Massa horària</title>
    <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbyG1KtxiEaTz2OfyB7-Eu1oj90trxNun24elecRA6w/exec">
    <style>
      :root {
        color-scheme: light;
        --navy: #17324d;
        --navy-2: #244b6f;
        --page: #edf1f4;
        --line: #d7dee5;
        --ink: #17212b;
        --muted: #667482;
      }
      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        font: 16px/1.4 Arial, Helvetica, sans-serif;
        color: var(--ink);
        background: var(--page);
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(680px, 100%);
        padding: 28px;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 12px 28px rgba(20, 38, 53, .08);
      }
      h1 {
        margin: 0 0 8px;
        color: var(--navy);
        font-size: 28px;
        line-height: 1.1;
      }
      p { margin: 0 0 12px; }
      .muted { color: var(--muted); }
      .actions { margin-top: 20px; }
      a.button {
        display: inline-block;
        padding: 10px 14px;
        color: #fff;
        text-decoration: none;
        background: var(--navy-2);
        border-radius: 6px;
      }
      a.button:hover { background: var(--navy); }
      code {
        display: inline-block;
        padding: 2px 6px;
        background: #f4f7f9;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Massa horària</h1>
        <p>Redirigint a l'aplicació de Google Apps Script.</p>
        <p class="muted">
          Si la redirecció no s'obre automàticament, fes servir aquest enllaç:
        </p>
        <div class="actions">
          <a class="button" href="https://script.google.com/macros/s/AKfycbyG1KtxiEaTz2OfyB7-Eu1oj90trxNun24elecRA6w/exec">Obre l'app</a>
        </div>
        <p class="muted" style="margin-top:16px">
          GitHub Pages servirà aquesta pàgina a <code>/util-apps/MassaHoraria/</code>.
        </p>
      </section>
    </main>
  </body>
</html>
